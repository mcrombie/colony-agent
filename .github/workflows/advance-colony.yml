name: Advance Colony

on:
  schedule:
    # Hourly while the simulation is being evaluated. This intentionally avoids
    # minute 0 because GitHub's scheduled runners are busiest at the top of
    # the hour. Change to
    # "0 12 * * *" for a once-daily run.
    - cron: "17 * * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: advance-colony
  cancel-in-progress: false

jobs:
  advance:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Run tests
        run: python -m pytest -p no:cacheprovider

      - name: Advance colony by one day
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: ${{ vars.OPENAI_MODEL }}
        run: python -m src.run_day

      - name: Commit updated colony state
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/state.json src/history.md
          if git diff --cached --quiet; then
            echo "No colony changes to commit."
          else
            git commit -m "Advance colony simulation"
            git push
          fi
