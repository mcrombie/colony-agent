name: Advance Colony

on:
  schedule:
    # Daily early-morning run. GitHub cron uses UTC, so this is about
    # 7:17 AM Eastern during daylight time and 6:17 AM during standard time.
    - cron: "17 11 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: advance-colony
  cancel-in-progress: false

jobs:
  advance:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check cadence
        id: cadence
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "Manual run requested; advancing colony."
            echo "should_advance=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          last_run_ts="$(git log -1 --format=%ct -- src/state.json src/history.md src/people_history.md 2>/dev/null || echo 0)"
          now_ts="$(date +%s)"
          age_seconds=$((now_ts - last_run_ts))

          if [ "$age_seconds" -lt 3000 ]; then
            echo "Colony files changed ${age_seconds}s ago; skipping this scheduled run."
            echo "should_advance=false" >> "$GITHUB_OUTPUT"
          else
            echo "No recent colony update found; advancing colony."
            echo "should_advance=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Python
        if: steps.cadence.outputs.should_advance == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        if: steps.cadence.outputs.should_advance == 'true'
        run: python -m pip install -r requirements.txt

      - name: Run tests
        if: steps.cadence.outputs.should_advance == 'true'
        run: python -m pytest -p no:cacheprovider

      - name: Advance colony by one day
        if: steps.cadence.outputs.should_advance == 'true'
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: ${{ vars.OPENAI_MODEL }}
        run: python -m src.run_day

      - name: Commit updated colony state
        if: steps.cadence.outputs.should_advance == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/state.json src/history.md src/people_history.md
          if git diff --cached --quiet; then
            echo "No colony changes to commit."
          else
            git commit -m "Advance colony simulation"
            git push
          fi
